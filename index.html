<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAP</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
}

/* Mobile Frame */
.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
  font-weight: bold;
  font-size: 18px;
}

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Logo */
.logo {
  width: 140px;
  margin-bottom: 10px;
}

/* KAP Text */
.title {
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 20px;
  color: #222;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 14px 18px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: #c24d2c;
  color: white;
}

.btn-outline {
  background: white;
  border: 1px solid #ccc;
}

/* Bottom Nav */
.navbar {
  display: flex;
  justify-content: space-around;
  padding: 12px;
  border-top: 1px solid #eee;
  font-size: 12px;
}

</style>
</head>

<body>

<div class="app">

  <!-- Header -->
  <div class="header">Ana Sayfa</div>

  <!-- Main -->
  <div class="main">

    <!-- Logo -->
    <img src="logo.png" class="logo">

    <!-- Title -->
    <div class="title">KAP</div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="btn btn-primary">Kurye Çağır</button>
      <button class="btn btn-outline">Kurye Pazarı</button>
    </div>

  </div>

  <!-- Bottom -->
  <div class="navbar">
    <div>Ana Sayfa</div>
    <div>Sipariş Form</div>
  </div>

</div>

</body>
</html>
