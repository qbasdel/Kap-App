<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KAP</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding-top: 60px;
}

.logo {
  width: 100px;
  margin-bottom: 10px;
}

h1 {
  font-size: 30px;
}

button {
  width: 220px;
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: #c04a2b;
  color: white;
}

.secondary {
  background: white;
  border: 1px solid #ccc;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<img src="https://i.imgur.com/8Km9tLL.png" class="logo">

<h1>KAP</h1>
<p>Kurye çağır, teklif topla, en uygun kuryeyi seç.</p>

<!-- Restaurant -->
<button id="restaurantBtn" class="primary">Kurye Çağır</button>

<!-- Driver -->
<button id="driverBtn" class="secondary">Kurye Pazarı</button>

<script>

// قراءة نوع المستخدم من اللينك
const params = new URLSearchParams(window.location.search);
const role = params.get("role");

// التحكم في الأزرار
if (role === "restaurant") {
  document.getElementById("driverBtn").style.display = "none";
}

if (role === "driver") {
  document.getElementById("restaurantBtn").style.display = "none";
}

// لو مفيش role → نخفي الاتنين
if (!role) {
  document.getElementById("restaurantBtn").style.display = "none";
  document.getElementById("driverBtn").style.display = "none";
}

</script>

</body>
</html>
